<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wowzers Games</title>

    <link rel="icon" href="W.png" type="image/png">

    <meta name="description" content="Play the best unblocked games at Wowzers Games!">

    <meta property="og:title" content="Wowzers Games">
    <meta property="og:description" content="Play the best unblocked games at Wowzers Games!">
    <meta property="og:image" content="https://www.wowzersgames.xyz/W.png">
    <meta property="og:url" content="https://www.wowzersgames.xyz/">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- BASE STYLING (DARK MODE DEFAULT) --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- LIGHT MODE OVERRIDES --- */
        body.light-mode {
            background-color: #f4f6f8;
            color: #2d3436;
        }

        /* --- NAVIGATION & CONTROLS --- */
        nav {
            background-color: #1e1e1e;
            padding: 15px 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 15px;
            transition: background-color 0.3s;
        }

        .light-mode nav {
            background-color: #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* Logo using W.png */
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ff4757;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            height: 35px;
            width: auto;
        }

        /* Tabs & Buttons */
        .nav-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: transparent;
            border: 2px solid transparent;
            padding: 8px 16px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: #a4b0be;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            color: #ff4757;
        }

        .tab-btn.active {
            background: #2d2d2d;
            color: #ff4757;
            border-color: #ff4757;
        }

        .light-mode .btn { color: #636e72; }
        .light-mode .tab-btn.active {
            background: #ffeaa7;
            color: #d63031;
            border-color: #fdcb6e;
        }

        /* Search Bar */
        #search-bar {
            padding: 10px 20px;
            border: 2px solid #333;
            background-color: #2d2d2d;
            color: white;
            border-radius: 25px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            width: 250px;
            outline: none;
            transition: all 0.3s;
        }

        #search-bar:focus {
            border-color: #ff4757;
            width: 300px;
        }

        .light-mode #search-bar {
            background-color: #fff;
            color: #333;
            border-color: #dfe6e9;
        }

        /* --- HOMEPAGE GRID STYLES --- */
        #home-view {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            font-size: 1.2rem;
            padding: 40px;
        }

        .game-card {
            position: relative;
            background: #1e1e1e;
            border-radius: 20px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .light-mode .game-card {
            background: #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(255, 71, 87, 0.2);
        }

        .game-thumbnail {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            transition: transform 0.4s ease;
            display: block;
        }

        .game-card:hover .game-thumbnail {
            transform: scale(1.1);
        }

        .game-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 40px 15px 15px 15px;
            color: white;
            text-align: left;
        }

        .game-info h3 {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .popular-badge {
            color: #fdcb6e;
            font-size: 1.2rem;
        }

        /* --- GAME PLAYER STYLES --- */
        #game-view {
            display: none;
            padding: 20px;
            min-height: 100vh;
        }

        .player-header {
            max-width: 1200px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: inherit;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .action-btn {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn:hover {
            background-color: #ff6b81;
            transform: scale(1.05);
        }

        .game-frame-container {
            max-width: 1200px;
            margin: 0 auto;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .game-frame {
            width: 100%;
            height: 80vh;
            border: none;
            display: block;
        }

        .player-desc {
            max-width: 1200px;
            margin: 20px auto;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<nav>
        <div class="logo">
            <img src="W.png" alt="Logo" onerror="this.style.display='none'"> 
            Wowzers Games
        </div>
        
        <div class="nav-controls">
            <div class="tabs">
                <button class="btn tab-btn active" onclick="setTab('ALL')" id="tab-ALL">All Games</button>
                <button class="btn tab-btn" onclick="setTab('POPULAR')" id="tab-POPULAR">⭐ Popular</button>
            </div>

            <a href="https://forms.gle/QvAB4DbkhmK2dKxt8" target="_blank" class="btn" style="text-decoration: none; display: flex; align-items: center; gap: 5px;">
                📝 Requests & Ratings
            </a>

            <input type="text" id="search-bar" placeholder="Search games..." oninput="handleSearch()">
            
            <button class="btn" id="theme-btn" onclick="toggleTheme()">☀️</button>
        </div>
    </nav>

    <div id="home-view">
        <div class="game-grid" id="grid-container"></div>
    </div>

    <div id="game-view">
        <div class="player-header">
            <div class="header-left">
                <button class="action-btn" onclick="goBackToMenu()">← Back</button>
                <h2 id="player-title">Loading...</h2>
            </div>
            <button class="action-btn" onclick="openFullscreen()">⛶ Fullscreen</button>
        </div>
        
        <div class="game-frame-container">
            <iframe id="player-frame" class="game-frame" src="" allowfullscreen></iframe>
        </div>
        
        <p id="player-desc" class="player-desc"></p>
    </div>

    <script>
        let currentTab = 'ALL'; 
        let searchQuery = '';

        // Removed GAME_ID entirely. The code now uses GAME_NAME to find it.
        const allGames = [
            {
                "GAME_NAME": "Cookie Clicker",
                "GAME_DESCRIPTION": "Click cookies to get more cookies!",
                "EMBED_URL": "https://class811.github.io/g/cookie-clicker/",
                "IMAGE_URL": "https://nu.vgmtreasurechest.com/soundtracks/cookie-clicker-gamerip-2013/cover.jpg",
                "POPULAR": true
            },
            {
                "GAME_NAME": "Krunker",
                "GAME_DESCRIPTION": "A fast-paced pixelated first-person shooter.",
                "EMBED_URL": "https://krunker.io/",
                "IMAGE_URL": "https://kevin.games/assets/images/games/krunker-io.jpg",
                "POPULAR": false
            },
            {
                "GAME_NAME": "Minecraft",
                "GAME_DESCRIPTION": "Build, Craft and Survive!",
                "EMBED_URL": "https://takaiwebsite.neocities.org/minecraft",
                "IMAGE_URL": "https://assets-prd.ignimgs.com/2021/12/14/minecraft-1639513933156.jpg?crop=1%3A1%2Csmart&format=jpg&auto=webp&quality=80",
                "POPULAR": true
            },
            {
                "GAME_NAME": "2048",
                "GAME_DESCRIPTION": "Slide Blocks Around",
                "EMBED_URL": "https://www.2048.org/",
                "IMAGE_URL": "https://imgs.crazygames.com/games/2048/cover_1x1-1707828857318.png?format=auto&quality=100&metadata=none&width=1200",
                "POPULAR": false
            },
            {
                "GAME_NAME": "Basketball Stars",
                "GAME_DESCRIPTION": "Shoot baskets",
                "EMBED_URL": "https://class811.github.io/g/basketball-stars/",
                "IMAGE_URL": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTFgl44n6XHSkI4zoYMnaqHp12Y31aYPIh7qw&s",
                "POPULAR": false
            }
        ];

        // Core Sorting & Filtering
        function getFilteredAndSortedGames() {
            let filteredGames = allGames.filter(game => {
                const matchesTab = currentTab === 'ALL' || (currentTab === 'POPULAR' && game.POPULAR === true);
                const matchesSearch = game.GAME_NAME.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesTab && matchesSearch;
            });

            return filteredGames.sort((a, b) => {
                if (a.POPULAR && !b.POPULAR) return -1;
                if (!a.POPULAR && b.POPULAR) return 1;
                return a.GAME_NAME.localeCompare(b.GAME_NAME, undefined, { numeric: true, sensitivity: 'base' });
            });
        }

        // Render the Grid
        function renderGrid() {
            const gridContainer = document.getElementById('grid-container');
            gridContainer.innerHTML = '';
            const gamesToDisplay = getFilteredAndSortedGames();

            if (gamesToDisplay.length === 0) {
                gridContainer.innerHTML = '<div class="no-results">No games found. Try searching for something else!</div>';
                return;
            }

            gamesToDisplay.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => openGame(game.GAME_NAME); // Opens game by name

                const popularIcon = game.POPULAR ? '<span class="popular-badge">⭐</span>' : '';
                card.innerHTML = `
                    <img class="game-thumbnail" src="${game.IMAGE_URL}" alt="${game.GAME_NAME}">
                    <div class="game-info">
                        <h3>${game.GAME_NAME} ${popularIcon}</h3>
                    </div>
                `;
                gridContainer.appendChild(card);
            });
        }

        // Tab Clicking
        function setTab(tabName) {
            currentTab = tabName;
            document.getElementById('tab-ALL').classList.remove('active');
            document.getElementById('tab-POPULAR').classList.remove('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
            renderGrid();
        }

        // Search Input
        function handleSearch() {
            searchQuery = document.getElementById('search-bar').value;
            renderGrid();
        }

        // Handle Playing a Game (Now uses GAME_NAME instead of ID)
        function openGame(gameName) {
            const game = allGames.find(g => g.GAME_NAME === gameName);
            if (game) {
                document.getElementById('player-title').innerText = game.GAME_NAME;
                document.getElementById('player-desc').innerText = game.GAME_DESCRIPTION;
                document.getElementById('player-frame').src = game.EMBED_URL;

                document.getElementById('home-view').style.display = 'none';
                document.getElementById('game-view').style.display = 'block';
                window.scrollTo(0, 0);
            }
        }

        // Handle Returning to Menu
        function goBackToMenu() {
            document.getElementById('player-frame').src = ""; 
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('home-view').style.display = 'block';
        }

        // --- NEW FEATURE: Fullscreen ---
        function openFullscreen() {
            const iframe = document.getElementById('player-frame');
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            } else if (iframe.webkitRequestFullscreen) { /* Safari */
                iframe.webkitRequestFullscreen();
            } else if (iframe.msRequestFullscreen) { /* IE11 */
                iframe.msRequestFullscreen();
            }
        }

        // --- NEW FEATURE: Dark/Light Mode Toggle ---
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const themeBtn = document.getElementById('theme-btn');
            
            if (document.body.classList.contains('light-mode')) {
                themeBtn.innerText = '🌙';
            } else {
                themeBtn.innerText = '☀️';
            }
        }

        // Start up the grid!
        renderGrid();
    </script>
</body>
</html>
