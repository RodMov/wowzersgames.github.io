<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Portal</title>
    <style>
        /* Base Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        /* --- HOMEPAGE GRID STYLES --- */
        #home-view {
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .game-card {
            background: white;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .game-card:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 10px 15px rgba(0,0,0,0.2);
        }

        .game-thumbnail {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 10px;
        }

        .game-card h3 {
            margin: 10px 0 0 0;
            font-size: 1.1rem;
        }

        /* --- GAME PLAYER STYLES --- */
        #game-view {
            display: none;
            max-width: 1000px;
            margin: 0 auto;
        }

        .back-btn {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background-color: #ff6b81;
        }

        .game-frame {
            width: 100%;
            height: 75vh;
            border: none;
            border-radius: 15px;
            background-color: #000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="home-view">
        <h1>🎮 Awesome Games</h1>
        <div class="game-grid" id="grid-container">
            </div>
    </div>

    <div id="game-view">
        <button class="back-btn" onclick="goBackToMenu()">← Back to Games</button>
        <h2 id="player-title">Loading...</h2>
        <iframe id="player-frame" class="game-frame" src="" allowfullscreen></iframe>
        <p id="player-desc"></p>
    </div>

    <script>
        // 1. Put the JSON data directly into this variable!
        // To add a new game, just copy and paste one of these blocks.
        const allGames = [
            {
                "GAME_ID": "slither",
                "GAME_NAME": "Slither.io",
                "GAME_DESCRIPTION": "Play against other people online! Can you become the longest player of the day?",
                "EMBED_URL": "https://slither.io/",
                "IMAGE_URL": "https://via.placeholder.com/1000x500"
            },
            {
                "GAME_ID": "krunker",
                "GAME_NAME": "Krunker",
                "GAME_DESCRIPTION": "A fast-paced pixelated first-person shooter.",
                "EMBED_URL": "https://krunker.io/",
                "IMAGE_URL": "https://via.placeholder.com/400x400"
            }
        ];

        // 2. Build the grid immediately when the page loads
        function buildGrid() {
            const gridContainer = document.getElementById('grid-container');
            gridContainer.innerHTML = ''; // Clear it out first

            allGames.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => openGame(game.GAME_ID);

                card.innerHTML = `
                    <img class="game-thumbnail" src="${game.IMAGE_URL}" alt="${game.GAME_NAME}">
                    <h3>${game.GAME_NAME}</h3>
                `;
                
                gridContainer.appendChild(card);
            });
        }

        // 3. Handle opening a game
        function openGame(id) {
            const game = allGames.find(g => g.GAME_ID === id);
            
            if (game) {
                document.getElementById('player-title').innerText = game.GAME_NAME;
                document.getElementById('player-desc').innerText = game.GAME_DESCRIPTION;
                document.getElementById('player-frame').src = game.EMBED_URL;

                document.getElementById('home-view').style.display = 'none';
                document.getElementById('game-view').style.display = 'block';
            }
        }

        // 4. Handle going back to the menu
        function goBackToMenu() {
            document.getElementById('player-frame').src = ""; // Stop the game from playing in the background
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('home-view').style.display = 'block';
        }

        // 5. Start everything up!
        buildGrid();
    </script>

</body>
</html>
